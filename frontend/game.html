<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Shora Games · Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0f17 0%, #0a0e1a 100%);
            color: #ffffff;
            padding-bottom: 70px;
        }
        .main-header {
            background: rgba(5, 12, 24, 0.95);
            backdrop-filter: blur(12px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        .logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #4a9eff, #0066ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .balance-header { font-weight: 700; font-size: 14px; color: #4a9eff; }
        .avatar-icon { width: 32px; height: 32px; background: rgba(59, 130, 246, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(59, 130, 246, 0.3); }
        .game-container { background: rgba(5, 12, 24, 0.85); border-radius: 24px; padding: 30px 20px; margin: 16px; text-align: center; border: 1px solid rgba(59, 130, 246, 0.3); }
        .game-title { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #4a9eff, #0066ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 20px; }
        .score-display { font-size: 48px; font-weight: 800; color: #FFD700; margin: 20px 0; }
        .click-area { background: rgba(59, 130, 246, 0.1); border: 2px dashed #3b82f6; border-radius: 20px; padding: 60px 20px; cursor: pointer; margin: 20px 0; }
        .click-area:active { transform: scale(0.98); }
        .timer { font-size: 32px; font-weight: 700; margin: 20px 0; color: #3b82f6; }
        .timer.warning { color: #ff4444; animation: pulse 0.5s infinite; }
        .game-over { display: none; }
        .game-over.show { display: block; }
        .result-card { background: rgba(5, 12, 24, 0.95); border-radius: 20px; padding: 25px; margin-top: 20px; }
        .final-score { font-size: 56px; font-weight: 800; color: #FFD700; margin: 10px 0; }
        .rank-badge { display: inline-block; background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6; border-radius: 40px; padding: 8px 20px; margin-top: 15px; font-size: 14px; }
        .restart-btn { background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6; color: white; padding: 12px 24px; border-radius: 40px; cursor: pointer; margin-top: 20px; }
        .join-btn { background: #FFD700; border: none; padding: 12px 24px; border-radius: 40px; color: #000; font-weight: 700; cursor: pointer; margin-top: 20px; margin-left: 12px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5, 12, 24, 0.95); backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 10px 16px; border-top: 1px solid rgba(59, 130, 246, 0.2); }
        .bottom-nav a { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #aaa; text-decoration: none; font-size: 11px; }
        .bottom-nav a i { font-size: 20px; }
        .page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0b0f17 0%, #0a0e1a 100%); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .page-loader.hidden { display: none; }
        .loader-spinner { width: 60px; height: 60px; border: 3px solid rgba(59, 130, 246, 0.2); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn-loader { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.3); border-top: 2px solid #000; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(5, 12, 24, 0.95); border: 1px solid #3b82f6; border-radius: 50px; padding: 12px 24px; color: #3b82f6; font-size: 14px; z-index: 1000; display: none; }
    </style>
</head>
<body>

<div class="page-loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">LOADING GAME</div>
</div>

<div class="main-header">
    <div class="logo"><i class="fas fa-gamepad"></i> SHORA</div>
    <div class="wallet-area">
        <span class="balance-header" id="headerBalance">0 RWF</span>
        <div class="avatar-icon" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i></div>
    </div>
</div>

<div class="game-container">
    <div class="game-title" id="gameName">Arcade Legends</div>
    <div class="score-display">🎯 SCORE: <span id="score">0</span></div>
    <div class="timer" id="timer">30s</div>
    <div id="clickArea" class="click-area">
        <i class="fas fa-gamepad" style="font-size: 64px; color: #3b82f6; margin-bottom: 16px;"></i>
        <p style="font-size: 18px; font-weight: 600;">CLICK HERE TO SCORE!</p>
        <p style="font-size: 12px; color: #888;">Click as fast as you can in 30 seconds</p>
    </div>
    <div id="gameOver" class="game-over">
        <div class="result-card">
            <i class="fas fa-trophy" style="font-size: 48px; color: #FFD700;"></i>
            <h3>GAME OVER!</h3>
            <div class="final-score" id="finalScore">0</div>
            <p>Your Score</p>
            <div class="rank-badge" id="rankMessage">Submit your score to see ranking</div>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
                <button class="restart-btn" id="restartBtn"><i class="fas fa-redo-alt"></i> Play Again</button>
                <button class="join-btn" id="submitScoreBtn">Submit Score →</button>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <a href="dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="leaderboard.html"><i class="fas fa-chart-line"></i><span>Leaderboard</span></a>
    <a href="#"><i class="fas fa-search"></i><span>Explore</span></a>
    <a href="#"><i class="fas fa-ticket-alt"></i><span>My Events</span></a>
    <a href="profile.html"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
    import { getDatabase, ref, get, child, push, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDTcM9aUFhOpJTdQTSZAF_1XMEt6GL48Hs",
        authDomain: "shora-games.firebaseapp.com",
        projectId: "shora-games",
        databaseURL: "https://shora-games-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let score = 0, timeLeft = 30, gameActive = false, timerInterval, currentUser, currentEventId;
    const events = { 1: "Arcade Legends", 2: "Speed Racing", 3: "Puzzle Masters", 4: "Chess Championship" };

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function updateUI() {
        document.getElementById('score').innerHTML = score;
        document.getElementById('timer').innerHTML = timeLeft + 's';
        if (timeLeft <= 5) document.getElementById('timer').classList.add('warning');
        else document.getElementById('timer').classList.remove('warning');
    }

    function endGame() {
        gameActive = false;
        clearInterval(timerInterval);
        document.getElementById('clickArea').style.pointerEvents = 'none';
        document.getElementById('finalScore').innerHTML = score;
        document.getElementById('gameOver').classList.add('show');
    }

    function startGame() {
        score = 0; timeLeft = 30; gameActive = true;
        updateUI();
        document.getElementById('gameOver').classList.remove('show');
        document.getElementById('clickArea').style.pointerEvents = 'auto';
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (timeLeft <= 1) endGame();
            else { timeLeft--; updateUI(); }
        }, 1000);
    }

    document.getElementById('clickArea').addEventListener('click', () => {
        if (gameActive) { score++; document.getElementById('score').innerHTML = score; }
    });

    document.getElementById('restartBtn').addEventListener('click', startGame);

    document.getElementById('submitScoreBtn').addEventListener('click', async () => {
        const btn = document.getElementById('submitScoreBtn');
        btn.innerHTML = '<span class="btn-loader"></span> Submitting...';
        btn.disabled = true;
        await push(ref(db, `scores/${currentEventId}`), { userId: currentUser.uid, score: score, timestamp: new Date().toISOString() });
        await update(ref(db, `users/${currentUser.uid}`), { gamesPlayed: (currentUser.gamesPlayed || 0) + 1 });
        showToast(`✓ Score of ${score} submitted!`);
        setTimeout(() => window.location.href = 'leaderboard.html', 1500);
    });

    onAuthStateChanged(auth, async (user) => {
        if (!user) window.location.href = 'login.html';
        else {
            currentEventId = localStorage.getItem('selectedEventId');
            if (!currentEventId) window.location.href = 'dashboard.html';
            currentUser = { uid: user.uid };
            const snapshot = await get(child(ref(db), `users/${user.uid}`));
            if (snapshot.exists()) {
                currentUser = snapshot.val();
                currentUser.uid = user.uid;
                document.getElementById('headerBalance').innerHTML = (currentUser.balance || 0) + ' RWF';
            }
            document.getElementById('gameName').innerHTML = events[currentEventId] || 'Game Event';
            startGame();
            document.querySelector('.page-loader').classList.add('hidden');
        }
    });
</script>
</body>
</html>
