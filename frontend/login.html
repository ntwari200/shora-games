<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Shora Games · Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0f17 0%, #0a0e1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-card {
            background: rgba(5, 12, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
        }
        .input-field {
            background: rgba(10, 25, 45, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 14px 16px;
            width: 100%;
            color: white;
            margin-top: 8px;
            font-size: 16px;
        }
        .input-field:focus { outline: none; border-color: #3b82f6; }
        .btn-primary {
            background: linear-gradient(145deg, #002244, #001433);
            border: 2px solid #2a7fff;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
        }
        .btn-primary:hover { background: linear-gradient(145deg, #003366, #001f4d); transform: translateY(-2px); }
        
        .btn-google {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.3);
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
        }
        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .google-icon {
            width: 20px;
            height: 20px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="%23FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="%23FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="%234CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="%231976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>') no-repeat center;
            background-size: contain;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #666;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }
        
        /* Forgot Password Link */
        .forgot-link {
            text-align: right;
            margin-top: 8px;
        }
        .forgot-link a {
            color: #3b82f6;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
        }
        .forgot-link a:hover { text-decoration: underline; }
        
        /* Modal Styles for Forgot Password */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: rgba(5, 12, 24, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            color: #3b82f6;
        }
        .modal-content input {
            margin-bottom: 20px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .modal-buttons .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .modal-buttons .btn-submit {
            background: linear-gradient(145deg, #002244, #001433);
            border: 2px solid #2a7fff;
            color: white;
        }
        
        .tab-btn {
            background: none;
            border: none;
            padding: 12px 24px;
            color: #aaa;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }
        .tab-btn.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .form { display: none; }
        .form.active { display: block; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 12, 24, 0.95);
            border: 1px solid #3b82f6;
            border-radius: 50px;
            padding: 12px 24px;
            color: #3b82f6;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
        .loader-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .gradient-text {
            background: linear-gradient(135deg, #4a9eff, #0066ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="text-center" style="text-align: center; margin-bottom: 24px;">
            <i class="fas fa-gamepad" style="font-size: 48px; color: #3b82f6;"></i>
            <h1 class="gradient-text" style="font-size: 28px; margin-top: 12px;">SHORA GAMES</h1>
            <p style="color: #888; font-size: 13px; margin-top: 8px;">Compete · Win · Become a Legend</p>
        </div>

        <div style="text-align: center; margin-bottom: 24px;">
            <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form active">
            <input type="email" id="loginEmail" class="input-field" placeholder="Email Address">
            <input type="password" id="loginPassword" class="input-field" placeholder="Password" style="margin-top: 16px;">
            
            <!-- Forgot Password Link -->
            <div class="forgot-link">
                <a onclick="openForgotModal()">Forgot Password?</a>
            </div>
            
            <button class="btn-primary" id="loginBtn">Sign In</button>
            
            <div class="divider">OR</div>
            
            <button class="btn-google" id="googleLoginBtn">
                <div class="google-icon"></div>
                Continue with Google
            </button>
            
            <p style="text-align: center; color: #888; font-size: 12px; margin-top: 20px;">
                <i class="fas fa-mobile-alt"></i> Powered by MTN Mobile Money
            </p>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="form">
            <input type="text" id="regUsername" class="input-field" placeholder="Username">
            <input type="email" id="regEmail" class="input-field" placeholder="Email Address" style="margin-top: 16px;">
            <input type="tel" id="regPhone" class="input-field" placeholder="Phone Number (+250...)" style="margin-top: 16px;">
            <input type="password" id="regPassword" class="input-field" placeholder="Password (min 6 chars)" style="margin-top: 16px;">
            <input type="password" id="regConfirm" class="input-field" placeholder="Confirm Password" style="margin-top: 16px;">
            <button class="btn-primary" id="registerBtn">Create Account</button>
            
            <div class="divider">OR</div>
            
            <button class="btn-google" id="googleRegisterBtn">
                <div class="google-icon"></div>
                Sign up with Google
            </button>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-key" style="font-size: 48px; color: #3b82f6; margin-bottom: 16px;"></i>
            <h3>Reset Password</h3>
            <p style="color: #888; font-size: 13px; margin-bottom: 20px;">Enter your email address and we'll send you a link to reset your password.</p>
            <input type="email" id="resetEmail" class="input-field" placeholder="Email Address">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeForgotModal()">Cancel</button>
                <button class="btn-submit" id="resetPasswordBtn">Send Reset Link</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTcM9aUFhOpJTdQTSZAF_1XMEt6GL48Hs",
            authDomain: "shora-games.firebaseapp.com",
            projectId: "shora-games",
            databaseURL: "https://shora-games-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.borderColor = isError ? '#ff4444' : '#3b82f6';
            toast.style.color = isError ? '#ff4444' : '#3b82f6';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function setButtonLoading(btn, loading, originalText = null) {
            if (loading) {
                btn.dataset.original = btn.innerHTML;
                btn.innerHTML = '<span class="loader-spinner"></span> Processing...';
                btn.disabled = true;
            } else {
                btn.innerHTML = btn.dataset.original || originalText;
                btn.disabled = false;
            }
        }

        // Modal Functions
        window.openForgotModal = () => {
            document.getElementById('forgotModal').classList.add('active');
        };
        
        window.closeForgotModal = () => {
            document.getElementById('forgotModal').classList.remove('active');
            document.getElementById('resetEmail').value = '';
        };

        window.switchTab = (tab) => {
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
            });
        };

        // Reset Password
        document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
            const email = document.getElementById('resetEmail').value;
            if (!email) {
                showToast('Please enter your email address', true);
                return;
            }
            
            const btn = document.getElementById('resetPasswordBtn');
            setButtonLoading(btn, true);
            
            try {
                await sendPasswordResetEmail(auth, email);
                showToast('✓ Password reset email sent! Check your inbox.');
                closeForgotModal();
            } catch (error) {
                let message = error.message;
                if (error.code === 'auth/user-not-found') {
                    message = 'No account found with this email address';
                }
                showToast(message, true);
            } finally {
                setButtonLoading(btn, false);
            }
        });

        // Email/Password Registration
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const btn = document.getElementById('registerBtn');

            if (!username || !email || !phone || !password) return showToast('All fields required', true);
            if (password !== confirm) return showToast('Passwords do not match', true);
            if (password.length < 6) return showToast('Password min 6 characters', true);

            setButtonLoading(btn, true);
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await set(ref(db, `users/${userCred.user.uid}`), {
                    username, email, phone, balance: 0, totalWinnings: 0, gamesPlayed: 0, createdAt: new Date().toISOString()
                });
                await sendEmailVerification(userCred.user);
                await auth.signOut();
                showToast('✓ Account created! Verify your email.');
                setTimeout(() => window.switchTab('login'), 2000);
            } catch (err) { showToast(err.message, true); }
            finally { setButtonLoading(btn, false); }
        });

        // Email/Password Login
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            if (!email || !password) return showToast('Enter email and password', true);
            setButtonLoading(btn, true);
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (err) { showToast(err.message, true); }
            finally { setButtonLoading(btn, false); }
        });

        // Google Sign In/Up
        async function handleGoogleSignIn() {
            const btn = document.activeElement;
            setButtonLoading(btn, true);
            
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                const snapshot = await get(child(ref(db), `users/${user.uid}`));
                
                if (!snapshot.exists()) {
                    const username = user.displayName || user.email.split('@')[0];
                    await set(ref(db, `users/${user.uid}`), {
                        username: username,
                        email: user.email,
                        phone: user.phoneNumber || 'Not provided',
                        balance: 0,
                        totalWinnings: 0,
                        gamesPlayed: 0,
                        createdAt: new Date().toISOString()
                    });
                    showToast(`✓ Welcome ${username}!`);
                } else {
                    showToast(`✓ Welcome back!`);
                }
                
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                if (error.code === 'auth/popup-blocked') {
                    showToast('Popup blocked! Please allow popups for this site.', true);
                } else {
                    showToast(error.message, true);
                }
            } finally {
                setButtonLoading(btn, false);
            }
        }

        document.getElementById('googleLoginBtn').addEventListener('click', handleGoogleSignIn);
        document.getElementById('googleRegisterBtn').addEventListener('click', handleGoogleSignIn);
    </script>
</body>
</html>
