<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Shora Games · Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/loaders.css">
    <style>
        .profile-header {
            background: linear-gradient(145deg, #002244, #001433);
            padding: 30px 20px;
            text-align: center;
        }
        .avatar-large {
            width: 80px;
            height: 80px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            border: 2px solid #3b82f6;
        }
        .info-panel {
            background: rgba(5, 12, 24, 0.85);
            border-radius: 20px;
            margin: 16px;
            padding: 20px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
        }
        .balance-large { font-size: 32px; font-weight: 800; color: #FFD700; }
        .action-buttons { display: flex; gap: 12px; padding: 0 16px; margin: 20px 0; }
        .action-btn {
            flex: 1;
            background: linear-gradient(145deg, #002244, #001433);
            border: 2px solid #2a7fff;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="page-loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">LOADING YOUR PROFILE</div>
    <div class="loader-progress"><div class="loader-progress-bar"></div></div>
</div>

<div class="main-header">
    <div class="logo"><i class="fas fa-gamepad"></i> SHORA</div>
    <div class="wallet-area">
        <span class="balance-header" id="headerBalance">0 RWF</span>
        <div class="avatar-icon" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i></div>
    </div>
</div>

<div id="profileContent">
    <div class="profile-header">
        <div class="avatar-large"><i class="fas fa-user"></i></div>
        <div class="skeleton skeleton-title" style="width: 150px; height: 24px; margin: 0 auto;"></div>
        <div class="skeleton skeleton-text" style="width: 200px; height: 14px; margin: 8px auto 0;"></div>
    </div>

    <div class="info-panel">
        <div class="skeleton skeleton-title" style="width: 100%; height: 60px;"></div>
        <div class="skeleton skeleton-text" style="width: 100%; height: 40px; margin-top: 12px;"></div>
        <div class="skeleton skeleton-text" style="width: 100%; height: 40px; margin-top: 12px;"></div>
        <div class="skeleton skeleton-text" style="width: 100%; height: 40px; margin-top: 12px;"></div>
    </div>
</div>

<div class="action-buttons">
    <div class="action-btn" onclick="window.location.href='deposit.html'">Deposit</div>
    <div class="action-btn" onclick="window.location.href='withdraw.html'">Withdraw</div>
</div>

<div class="bottom-nav">
    <a href="dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="leaderboard.html"><i class="fas fa-chart-line"></i><span>Leaderboard</span></a>
    <a href="#"><i class="fas fa-search"></i><span>Explore</span></a>
    <a href="#"><i class="fas fa-ticket-alt"></i><span>My Events</span></a>
    <a href="profile.html" class="active"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDTcM9aUFhOpJTdQTSZAF_1XMEt6GL48Hs",
        authDomain: "shora-games.firebaseapp.com",
        projectId: "shora-games",
        databaseURL: "https://shora-games-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) window.location.href = 'login.html';
        else {
            const snapshot = await get(child(ref(db), `users/${user.uid}`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                const profileContent = document.getElementById('profileContent');
                profileContent.innerHTML = `
                    <div class="profile-header">
                        <div class="avatar-large"><i class="fas fa-user"></i></div>
                        <h2>${data.username}</h2>
                        <p style="color: #888;">${data.email}</p>
                    </div>
                    <div class="info-panel">
                        <div class="info-row"><span>💰 Available Balance</span><span class="balance-large">${data.balance || 0} RWF</span></div>
                        <div class="info-row"><span>🏆 Total Winnings</span><span>${data.totalWinnings || 0} RWF</span></div>
                        <div class="info-row"><span>🎮 Games Played</span><span>${data.gamesPlayed || 0}</span></div>
                        <div class="info-row"><span>⭐ Win Rate</span><span>${data.winRate || 0}%</span></div>
                    </div>
                `;
                document.getElementById('headerBalance').innerHTML = (data.balance || 0) + ' RWF';
            }
            
            setTimeout(() => {
                const loader = document.querySelector('.page-loader');
                if (loader) loader.classList.add('hidden');
            }, 500);
        }
    });
</script>
<script src="js/loaders.js"></script>
</body>
</html>
