<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Shora Games · Event Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0f17 0%, #0a0e1a 100%);
            color: #ffffff;
            padding-bottom: 70px;
        }
        .main-header {
            background: rgba(5, 12, 24, 0.95);
            backdrop-filter: blur(12px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #4a9eff, #0066ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .wallet-area { display: flex; align-items: center; gap: 12px; }
        .balance-header { font-weight: 700; font-size: 14px; color: #4a9eff; }
        .avatar-icon { width: 32px; height: 32px; background: rgba(59, 130, 246, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(59, 130, 246, 0.3); }
        .event-hero { background: linear-gradient(145deg, #002244, #001433); padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(59, 130, 246, 0.3); }
        .prize-distribution { background: rgba(5, 12, 24, 0.85); border-radius: 16px; padding: 20px; margin: 16px; }
        .prize-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(59, 130, 246, 0.1); }
        .join-btn { width: calc(100% - 32px); margin: 0 16px; background: linear-gradient(145deg, #002244, #001433); border: 2px solid #2a7fff; padding: 16px; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; font-size: 16px; }
        .join-btn:hover { background: linear-gradient(145deg, #003366, #001f4d); transform: translateY(-2px); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5, 12, 24, 0.95); backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 10px 16px; border-top: 1px solid rgba(59, 130, 246, 0.2); z-index: 100; }
        .bottom-nav a { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #aaa; text-decoration: none; font-size: 11px; }
        .bottom-nav a i { font-size: 20px; }
        .bottom-nav a.active { color: #3b82f6; }
        .page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0b0f17 0%, #0a0e1a 100%); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .page-loader.hidden { display: none; }
        .loader-spinner { width: 60px; height: 60px; border: 3px solid rgba(59, 130, 246, 0.2); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-loader { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.3); border-top: 2px solid #000; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
        .section-loader { display: flex; justify-content: center; padding: 40px; gap: 12px; }
        .section-loader .dot { width: 12px; height: 12px; background: #3b82f6; border-radius: 50%; animation: bounce 1.4s infinite; }
        .section-loader .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(5, 12, 24, 0.95); border: 1px solid #3b82f6; border-radius: 50px; padding: 12px 24px; color: #3b82f6; font-size: 14px; z-index: 1000; display: none; }
    </style>
</head>
<body>

<div class="page-loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">LOADING EVENT DETAILS</div>
</div>

<div class="main-header">
    <div class="logo"><i class="fas fa-gamepad"></i> SHORA</div>
    <div class="wallet-area">
        <span class="balance-header" id="headerBalance">0 RWF</span>
        <div class="avatar-icon" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i></div>
    </div>
</div>

<div id="eventHero" class="event-hero">
    <div id="eventIcon" style="font-size: 60px;">🎮</div>
    <h2 id="eventName">Loading...</h2>
</div>

<div id="prizeContainer" class="prize-distribution">
    <div class="section-loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<button class="join-btn" id="payBtn">Pay Entry Fee & Join</button>

<div class="bottom-nav">
    <a href="dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="leaderboard.html"><i class="fas fa-chart-line"></i><span>Leaderboard</span></a>
    <a href="#"><i class="fas fa-search"></i><span>Explore</span></a>
    <a href="#"><i class="fas fa-ticket-alt"></i><span>My Events</span></a>
    <a href="profile.html"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
    import { getDatabase, ref, get, child, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDTcM9aUFhOpJTdQTSZAF_1XMEt6GL48Hs",
        authDomain: "shora-games.firebaseapp.com",
        projectId: "shora-games",
        databaseURL: "https://shora-games-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const events = {
        1: { name: "Arcade Legends", entryFee: 500, prizePool: 5000, icon: "🎮", prize1: 2500, prize2: 1500, prize3: 1000, prize4: "500 each" },
        2: { name: "Speed Racing", entryFee: 1000, prizePool: 10000, icon: "🏎️", prize1: 5000, prize2: 3000, prize3: 2000, prize4: "1000 total" },
        3: { name: "Puzzle Masters", entryFee: 300, prizePool: 3000, icon: "🧩", prize1: 1500, prize2: 1000, prize3: 500, prize4: "200 total" },
        4: { name: "Chess Championship", entryFee: 1500, prizePool: 15000, icon: "♟️", prize1: 7500, prize2: 4500, prize3: 3000, prize4: "1000 total" }
    };

    let currentEvent, currentUser, currentBalance;

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function setButtonLoading(btn, loading) {
        if (loading) {
            btn.dataset.original = btn.innerHTML;
            btn.innerHTML = '<span class="btn-loader"></span> Processing...';
            btn.disabled = true;
        } else {
            btn.innerHTML = btn.dataset.original;
            btn.disabled = false;
        }
    }

    async function loadEventDetails() {
        const eventId = localStorage.getItem('selectedEventId');
        if (!eventId) window.location.href = 'dashboard.html';
        
        currentEvent = events[eventId];
        document.getElementById('eventIcon').innerHTML = currentEvent.icon;
        document.getElementById('eventName').innerHTML = currentEvent.name;
        
        document.getElementById('prizeContainer').innerHTML = `
            <h3 style="margin-bottom: 16px;"><i class="fas fa-trophy"></i> Prize Distribution</h3>
            <div class="prize-row"><span>🥇 1st Place</span><span style="color: #FFD700;">${currentEvent.prize1} RWF</span></div>
            <div class="prize-row"><span>🥈 2nd Place</span><span style="color: #C0C0C0;">${currentEvent.prize2} RWF</span></div>
            <div class="prize-row"><span>🥉 3rd Place</span><span style="color: #CD7F32;">${currentEvent.prize3} RWF</span></div>
            <div class="prize-row"><span>👥 4th-10th Place</span><span>${currentEvent.prize4}</span></div>
        `;
        document.getElementById('payBtn').innerHTML = `Pay ${currentEvent.entryFee} RWF & Join`;
        document.querySelector('.page-loader').classList.add('hidden');
    }

    document.getElementById('payBtn').addEventListener('click', async () => {
        const btn = document.getElementById('payBtn');
        setButtonLoading(btn, true);
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        if (currentBalance >= currentEvent.entryFee) {
            const newBalance = currentBalance - currentEvent.entryFee;
            await update(ref(db, `users/${currentUser.uid}`), { balance: newBalance });
            showToast(`✓ Joined ${currentEvent.name}! Good luck!`);
            setButtonLoading(btn, false);
            setTimeout(() => window.location.href = 'game.html', 1500);
        } else {
            showToast(`Insufficient balance! Need ${currentEvent.entryFee} RWF.`, true);
            setButtonLoading(btn, false);
        }
    });

    onAuthStateChanged(auth, async (user) => {
        if (!user) window.location.href = 'login.html';
        else {
            currentUser = user;
            const snapshot = await get(child(ref(db), `users/${user.uid}`));
            if (snapshot.exists()) {
                currentBalance = snapshot.val().balance || 0;
                document.getElementById('headerBalance').innerHTML = currentBalance + ' RWF';
            }
            await loadEventDetails();
        }
    });
</script>
</body>
</html>
